appId: dev.carlo.lol-companion
productName: LoL Companion
directories:
  output: dist
files:
  - out/**
extraResources:
  - from: certs/riotgames.pem
    to: certs/riotgames.pem
# Icon: resources/icon.png, generated by scripts/make-icon.mjs and committed
# (the main process also imports it for the runtime window icon).
icon: resources/icon.png
win:
  target: nsis
nsis:
  # Per-user one-click installer: no admin rights needed on friends' PCs.
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: false
  artifactName: ${productName}-${version}-setup.${ext}

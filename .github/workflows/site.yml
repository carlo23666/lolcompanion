name: site

# Deploys site/ to GitHub Pages. One-time setup: Settings → Pages → Source:
# "GitHub Actions". Screenshots live in docs/media/{en,es}/ (single source of
# truth, also embedded in the README) and are staged into the artifact here so
# the English page shows the English UI and the Spanish page the Spanish UI.
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'docs/media/**'
      - 'src/renderer/public/mascot/**'
      - '.github/workflows/site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage site with media and favicon
        run: |
          mkdir -p _site/media/en _site/media/es _site/mascot
          cp -r site/. _site/
          cp docs/media/en/*.png _site/media/en/
          cp docs/media/es/*.png _site/media/es/
          cp src/renderer/public/mascot/*-sheet.png _site/mascot/
          cp resources/icon.png _site/icon.png
      - uses: actions/configure-pages@v5
        with:
          # Creates the Pages site on first run — no manual Settings step.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
